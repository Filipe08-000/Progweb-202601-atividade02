<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ficha de Inscrição</title>
</head>

<body>

<form>

<table border="0" align="center" cellpadding="8">

<tr>
<th colspan="6"><font size="5">Ficha de Inscrição</font></th>
</tr>
<tr>
<td colspan="6">
<hr size="1" color="#E0E0E0">
</td>
</tr>

<tr>
<td colspan="8">Nome do candidato: <input type="text" name="nome" size="70"></td>
</tr>
<tr>
<td colspan="8">Endereço: <input type="text" name="endereco" size="70"></td>
</tr>

<tr>
<td>CEP: <td><input type="text" name="cep" size="10"></td>

<td>
<select name="cidade">
<option>-- Cidade --</option>
<option>São Paulo</option>
<option>Rio de Janeiro</option>
<option>Belo Horizonte</option>
<option>Brasília</option>
</select>
</td>

<td>
<select name="uf">
<option>-- UF --</option>
<option>SP</option>
<option>RJ</option>
<option>MG</option>
<option>DF</option>
</select>
</td>

<td colspan="2"></td>
</tr>

<tr>
<td>Telefone:</td>
<td><input type="text" size="10"></td>
<td><input type="text" size="10"></td>
<td><input type="text" size="10"></td>
<td colspan="2"></td>
</tr>

<tr>
<td>RG:</td>
<td><input type="text" size="15"></td>

<td>CPF:</td>
<td><input type="text" size="15"></td>

<td>Sexo:</td>
<td>
<input type="radio" name="sexo"> Mas.
<input type="radio" name="sexo"> Fem.
</td>
</tr>

<tr>
<td>Escolaridade:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Fundamental</option>
<option>Médio</option>
<option>Superior</option>
</select>
</td>

<td>Email:</td>
<td colspan="3"><input type="email" size="35"></td>
</tr>

<tr>
<td>Curso:</td>
<td>
<select>
<option>-- Selecione --</option>
<option>Informática</option>
<option>Administração</option>
<option>Contabilidade</option>
</select>
</td>

<td colspan="2">Senha de acompanhamento:</td>
<td colspan="2"><input type="password" size="20"></td>
</tr>
<tr>
<td colspan="6">
<hr size="1" color="#E0E0E0">
</td>
</tr>

<tr>
<td colspan="6" align="center">
<br>

<table bgcolor="#3B88D9" cellpadding="4" cellspacing="0" border="0">
<tr>
<td>
<input type="submit" value="CADASTRAR">
</td>
</tr>
</table>

</td>
</tr>

</table>
</form>
